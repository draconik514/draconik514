name: Update Profile

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Update README timestamp
        run: |
          echo "Last updated: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')" > .last_updated

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: auto-update profile"
          branch: main
