<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="50%" style="stop-color:#0a0000"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <radialGradient id="fireCore" cx="50%" cy="70%" r="45%">
      <stop offset="0%" style="stop-color:#ff1100;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  <rect width="900" height="300" fill="url(#fireCore)" rx="12"/>

  <!-- Grid -->
  <g stroke="#ff0000" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- Fire particles -->
  <g filter="url(#blur)">
    <circle cx="80" cy="280" r="3" fill="#ff4500" opacity="0.8">
      <animate attributeName="cy" values="280;80;280" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;0.5;3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="290" r="2.5" fill="#ff0000" opacity="0.7">
      <animate attributeName="cy" values="290;100;290" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="285" r="3" fill="#ff4500" opacity="0.6">
      <animate attributeName="cy" values="285;60;285" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="295" r="3.5" fill="#ff2200" opacity="0.9">
      <animate attributeName="cy" values="295;50;295" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="280" r="2.5" fill="#ff4500" opacity="0.7">
      <animate attributeName="cy" values="280;90;280" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="290" r="3" fill="#ff0000" opacity="0.8">
      <animate attributeName="cy" values="290;70;290" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="870" cy="275" r="2" fill="#ff4500" opacity="0.6">
      <animate attributeName="cy" values="275;100;275" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect width="898" height="298" fill="none" stroke="#ff0000" stroke-width="1" rx="12" opacity="0.15"/>
</svg>
