<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="50%" style="stop-color:#00050f"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <radialGradient id="glowCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="15%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#00b4ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00b4ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#00b4ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00b4ff;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="1.5"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  <rect width="900" height="300" fill="url(#glowCore)" rx="12"/>
  <rect width="900" height="300" fill="url(#glowLeft)" rx="12"/>
  <rect width="900" height="300" fill="url(#glowRight)" rx="12"/>

  <!-- Grid -->
  <g stroke="#00b4ff" stroke-width="0.3" opacity="0.07">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- Neon particles floating up -->
  <g filter="url(#blur)">
    <circle cx="80" cy="280" r="3" fill="#00b4ff" opacity="0.9">
      <animate attributeName="cy" values="280;60;280" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;0.5;3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="290" r="2.5" fill="#0066ff" opacity="0.8">
      <animate attributeName="cy" values="290;80;290" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="285" r="3" fill="#00eeff" opacity="0.7">
      <animate attributeName="cy" values="285;50;285" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="295" r="3.5" fill="#00b4ff" opacity="1">
      <animate attributeName="cy" values="295;40;295" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="280" r="2.5" fill="#0066ff" opacity="0.8">
      <animate attributeName="cy" values="280;70;280" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="290" r="3" fill="#00b4ff" opacity="0.9">
      <animate attributeName="cy" values="290;60;290" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="870" cy="275" r="2" fill="#00eeff" opacity="0.7">
      <animate attributeName="cy" values="275;90;275" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <!-- Extra particles -->
    <circle cx="140" cy="260" r="2" fill="#00eeff" opacity="0.6">
      <animate attributeName="cy" values="260;100;260" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="270" r="2.5" fill="#00b4ff" opacity="0.7">
      <animate attributeName="cy" values="270;110;270" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="265" r="2" fill="#0066ff" opacity="0.8">
      <animate attributeName="cy" values="265;85;265" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect width="898" height="298" fill="none" stroke="#00b4ff" stroke-width="1" rx="12" opacity="0.15"/>
</svg>
