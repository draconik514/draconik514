<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <rect width="900" height="300" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="300" fill="url(#glow1)" rx="12"/>
  <rect width="900" height="300" fill="url(#glow2)" rx="12"/>

  <!-- Grid -->
  <g stroke="#00e5ff" stroke-width="0.3" opacity="0.07">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- Animated particles -->
  <g filter="url(#blur)">
    <circle cx="80" cy="60" r="2.5" fill="#00e5ff" opacity="0.5">
      <animate attributeName="cy" values="60;240;60" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="150" r="2" fill="#7c3aed" opacity="0.6">
      <animate attributeName="cy" values="150;50;150" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="80" r="3" fill="#00e5ff" opacity="0.3">
      <animate attributeName="cx" values="350;370;350" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;220;80" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="200" r="2" fill="#7c3aed" opacity="0.5">
      <animate attributeName="cy" values="200;80;200" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="120" r="2.5" fill="#00e5ff" opacity="0.4">
      <animate attributeName="cy" values="120;260;120" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="70" r="2" fill="#7c3aed" opacity="0.6">
      <animate attributeName="cy" values="70;200;70" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="870" cy="180" r="1.5" fill="#00e5ff" opacity="0.5">
      <animate attributeName="cy" values="180;60;180" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Border -->
  <rect width="898" height="298" fill="none" stroke="#00e5ff" stroke-width="1" rx="12" opacity="0.15"/>
</svg>
