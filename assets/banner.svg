<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <!-- Nama: gradient emas → ungu → cyan -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="35%" style="stop-color:#bf00ff">
        <animate attributeName="stop-color" values="#bf00ff;#ffd700;#00eeff;#bf00ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" style="stop-color:#00eeff">
        <animate attributeName="stop-color" values="#00eeff;#bf00ff;#ffd700;#00eeff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="crackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bf00ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00b4ff;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#bf00ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nameglow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="220" fill="url(#bg)" rx="12"/>
  <rect width="900" height="220" fill="url(#centerGlow)" rx="12"/>

  <!-- Grid -->
  <g stroke="#bf00ff" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="44" x2="900" y2="44"/><line x1="0" y1="88" x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/><line x1="0" y1="176" x2="900" y2="176"/>
    <line x1="180" y1="0" x2="180" y2="220"/><line x1="360" y1="0" x2="360" y2="220"/>
    <line x1="540" y1="0" x2="540" y2="220"/><line x1="720" y1="0" x2="720" y2="220"/>
  </g>

  <!-- Crack lines colorful -->
  <g stroke="url(#crackGrad)" stroke-width="0.8" opacity="0.6" filter="url(#glow)">
    <line x1="450" y1="110" x2="370" y2="25"/>
    <line x1="450" y1="110" x2="330" y2="65"/>
    <line x1="450" y1="110" x2="530" y2="18"/>
    <line x1="450" y1="110" x2="570" y2="50"/>
    <line x1="450" y1="110" x2="290" y2="95"/>
    <line x1="450" y1="110" x2="610" y2="88"/>
    <line x1="450" y1="110" x2="190" y2="145"/>
    <line x1="450" y1="110" x2="710" y2="155"/>
    <line x1="450" y1="110" x2="345" y2="205"/>
    <line x1="450" y1="110" x2="555" y2="208"/>
  </g>

  <!-- Colorful particles -->
  <circle cx="90" cy="190" r="2.5" fill="#ffd700" filter="url(#glow)">
    <animate attributeName="cy" values="190;50;190" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="210" cy="200" r="2" fill="#bf00ff" filter="url(#glow)">
    <animate attributeName="cy" values="200;70;200" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="210" r="3" fill="#00eeff" filter="url(#glow)">
    <animate attributeName="cy" values="210;80;210" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="195" r="2.5" fill="#ff6b35" filter="url(#glow)">
    <animate attributeName="cy" values="195;55;195" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="810" cy="185" r="2" fill="#00ff88" filter="url(#glow)">
    <animate attributeName="cy" values="185;45;185" dur="2.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="330" cy="198" r="1.8" fill="#ffd700" filter="url(#glow)">
    <animate attributeName="cy" values="198;68;198" dur="3.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="3.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="560" cy="192" r="2" fill="#bf00ff" filter="url(#glow)">
    <animate attributeName="cy" values="192;60;192" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Border colorful -->
  <rect width="898" height="218" fill="none" stroke="url(#nameGrad)" stroke-width="2" rx="12" opacity="0.9"/>

  <!-- Corner accents — tiap sudut warna beda -->
  <polyline points="12,45 12,12 45,12" fill="none" stroke="#ffd700" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="855,12 888,12 888,45" fill="none" stroke="#00eeff" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="12,175 12,208 45,208" fill="none" stroke="#bf00ff" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="855,208 888,208 888,175" fill="none" stroke="#00ff88" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Name shadow glow -->
  <text x="452" y="97" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="42" font-weight="700"
    fill="#ffd700" opacity="0.2" filter="url(#nameglow)" letter-spacing="4">Abubakar Siddiq</text>

  <!-- Name — gradient emas ungu cyan -->
  <text x="450" y="95" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="42" font-weight="700"
    fill="url(#nameGrad)" filter="url(#glow2)" letter-spacing="4">
    Abubakar Siddiq
    <animate attributeName="opacity" values="1;0.88;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle warna ungu -->
  <text x="450" y="133" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14"
    fill="#bf00ff" letter-spacing="5" filter="url(#glow)">── FULLSTACK DEVELOPER ──</text>

  <!-- Typing warna cyan -->
  <text x="450" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#00eeff">
    &gt; Forging code in the dark, one commit at a time_
    <animate attributeName="opacity" values="1;0.15;1" dur="1.4s" repeatCount="indefinite"/>
  </text>
</svg>
