<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#00e5ff">
        <animate attributeName="stop-color" values="#00e5ff;#7c3aed;#00e5ff" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g stroke="#00e5ff" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Floating particles -->
  <circle cx="50" cy="30" r="2" fill="#00e5ff" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cy" values="30;170;30" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="80" r="1.5" fill="#7c3aed" opacity="0.7" filter="url(#glow)">
    <animate attributeName="cy" values="80;20;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="50" r="2" fill="#00e5ff" opacity="0.5" filter="url(#glow)">
    <animate attributeName="cy" values="50;150;50" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="120" r="1.5" fill="#7c3aed" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cy" values="120;40;120" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="170" r="2" fill="#00e5ff" opacity="0.4" filter="url(#glow)">
    <animate attributeName="cx" values="400;420;400" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Border glow -->
  <rect width="898" height="198" fill="none" stroke="url(#textGrad)" stroke-width="1.5" rx="12" opacity="0.5"/>

  <!-- Corner accents -->
  <polyline points="12,40 12,12 40,12" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
  <polyline points="860,12 888,12 888,40" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
  <polyline points="12,160 12,188 40,188" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
  <polyline points="860,188 888,188 888,160" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>

  <!-- Main title -->
  <text x="450" y="85" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="38" font-weight="700"
    fill="url(#textGrad)" filter="url(#glow2)" letter-spacing="3">
    Abubakar Siddiq
    <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15"
    fill="#a0aec0" letter-spacing="2">
    Fullstack Developer  •  Go Backend  •  React
  </text>

  <!-- Typing line -->
  <text x="450" y="155" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#00e5ff" opacity="0.8">
    &gt; Building real-world applications, one commit at a time_
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </text>
</svg>
