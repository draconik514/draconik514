<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="40%" style="stop-color:#0a0000"/>
      <stop offset="100%" style="stop-color:#050005"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="40%" style="stop-color:#ff4500">
        <animate attributeName="stop-color" values="#ff4500;#ff0000;#ff6600;#ff0000;#ff4500" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ff0000"/>
    </linearGradient>
    <linearGradient id="crackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#ff2200;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="220" fill="url(#bg)" rx="12"/>
  <rect width="900" height="220" fill="url(#centerGlow)" rx="12"/>

  <!-- Dark hex grid -->
  <g stroke="#ff0000" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="44" x2="900" y2="44"/>
    <line x1="0" y1="88" x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/>
    <line x1="0" y1="176" x2="900" y2="176"/>
    <line x1="180" y1="0" x2="180" y2="220"/>
    <line x1="360" y1="0" x2="360" y2="220"/>
    <line x1="540" y1="0" x2="540" y2="220"/>
    <line x1="720" y1="0" x2="720" y2="220"/>
  </g>

  <!-- Crack lines from center -->
  <g stroke="url(#crackGrad)" stroke-width="1" opacity="0.7" filter="url(#glow)">
    <line x1="450" y1="110" x2="380" y2="30"/>
    <line x1="450" y1="110" x2="340" y2="60"/>
    <line x1="450" y1="110" x2="520" y2="20"/>
    <line x1="450" y1="110" x2="560" y2="55"/>
    <line x1="450" y1="110" x2="300" y2="90"/>
    <line x1="450" y1="110" x2="600" y2="85"/>
    <line x1="450" y1="110" x2="200" y2="140"/>
    <line x1="450" y1="110" x2="700" y2="150"/>
    <line x1="450" y1="110" x2="350" y2="200"/>
    <line x1="450" y1="110" x2="550" y2="210"/>
  </g>

  <!-- Fire particles -->
  <circle cx="100" cy="180" r="2.5" fill="#ff4500" filter="url(#glow)">
    <animate attributeName="cy" values="180;60;180" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;0.5;2.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="2" fill="#ff0000" filter="url(#glow)">
    <animate attributeName="cy" values="200;80;200" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="190" r="2.5" fill="#ff4500" filter="url(#glow)">
    <animate attributeName="cy" values="190;50;190" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="170" r="2" fill="#ff6600" filter="url(#glow)">
    <animate attributeName="cy" values="170;40;170" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="210" r="3" fill="#ff2200" filter="url(#glow)">
    <animate attributeName="cy" values="210;100;210" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="195" r="1.5" fill="#ff4500" filter="url(#glow)">
    <animate attributeName="cy" values="195;70;195" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="185" r="2" fill="#ff0000" filter="url(#glow)">
    <animate attributeName="cy" values="185;55;185" dur="2.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2.7s" repeatCount="indefinite"/>
  </circle>

  <!-- Border blood red -->
  <rect width="898" height="218" fill="none" stroke="url(#fireGrad)" stroke-width="1.5" rx="12" opacity="0.7"/>

  <!-- Corner blades -->
  <polyline points="12,45 12,12 45,12" fill="none" stroke="#ff0000" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="855,12 888,12 888,45" fill="none" stroke="#ff0000" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="12,175 12,208 45,208" fill="none" stroke="#ff4500" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="855,208 888,208 888,175" fill="none" stroke="#ff4500" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Main title shadow -->
  <text x="452" y="97" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="42" font-weight="700"
    fill="#ff0000" opacity="0.3" filter="url(#redglow)" letter-spacing="4">Abubakar Siddiq</text>

  <!-- Main title -->
  <text x="450" y="95" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="42" font-weight="700"
    fill="url(#fireGrad)" filter="url(#glow2)" letter-spacing="4">
    Abubakar Siddiq
    <animate attributeName="opacity" values="1;0.88;1" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="132" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14"
    fill="#8b0000" letter-spacing="4" filter="url(#glow)">
    ── FULLSTACK DEVELOPER ──
  </text>

  <!-- Typing line -->
  <text x="450" y="168" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff4500" opacity="0.9">
    &gt; Forging code in the dark, one commit at a time_
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.4s" repeatCount="indefinite"/>
  </text>
</svg>
