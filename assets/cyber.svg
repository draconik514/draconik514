<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyberBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="cyberText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#00e5ff;#7c3aed" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="900" height="160" rx="12"/>
    </clipPath>
  </defs>

  <rect width="900" height="160" fill="url(#cyberBg)" rx="12"/>

  <!-- Perspective grid -->
  <g clip-path="url(#clip)" stroke="#00e5ff" stroke-width="0.4" opacity="0.12">
    <line x1="450" y1="160" x2="0" y2="80"/><line x1="450" y1="160" x2="100" y2="80"/>
    <line x1="450" y1="160" x2="200" y2="80"/><line x1="450" y1="160" x2="300" y2="80"/>
    <line x1="450" y1="160" x2="400" y2="80"/><line x1="450" y1="160" x2="500" y2="80"/>
    <line x1="450" y1="160" x2="600" y2="80"/><line x1="450" y1="160" x2="700" y2="80"/>
    <line x1="450" y1="160" x2="800" y2="80"/><line x1="450" y1="160" x2="900" y2="80"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="115" x2="900" y2="115"/>
    <line x1="0" y1="130" x2="900" y2="130"/>
    <line x1="0" y1="145" x2="900" y2="145"/>
  </g>

  <!-- Scan line -->
  <rect x="0" y="0" width="900" height="3" fill="#00e5ff" opacity="0.15">
    <animate attributeName="y" values="0;160;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Main text -->
  <text x="450" y="75" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700"
    fill="url(#cyberText)" filter="url(#glow)" letter-spacing="8">
    DRACONIK514
  </text>
  <text x="450" y="105" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12"
    fill="#a0aec0" letter-spacing="6" opacity="0.8">
    FULLSTACK  DEVELOPER
  </text>

  <!-- Side accents -->
  <line x1="60" y1="75" x2="200" y2="75" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
  <line x1="700" y1="75" x2="840" y2="75" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="105" x2="180" y2="105" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <line x1="720" y1="105" x2="820" y2="105" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <!-- Border -->
  <rect width="898" height="158" fill="none" stroke="url(#cyberText)" stroke-width="1.5" rx="12" opacity="0.4"/>
  <polyline points="12,35 12,12 35,12" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.7"/>
  <polyline points="865,12 888,12 888,35" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.7"/>
  <polyline points="12,125 12,148 35,148" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.7"/>
  <polyline points="865,148 888,148 888,125" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.7"/>
</svg>
