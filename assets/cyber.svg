<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0000"/>
    </linearGradient>
    <linearGradient id="fireText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="50%" style="stop-color:#ff6600">
        <animate attributeName="stop-color" values="#ff6600;#ff0000;#ff4500;#ff6600" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ff0000"/>
    </linearGradient>
    <radialGradient id="centerFire" cx="50%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#ff2200;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="900" height="180" rx="12"/>
    </clipPath>
  </defs>

  <rect width="900" height="180" fill="url(#bg)" rx="12"/>
  <rect width="900" height="180" fill="url(#centerFire)" rx="12"/>

  <!-- Perspective floor grid -->
  <g clip-path="url(#clip)" stroke="#ff0000" stroke-width="0.5" opacity="0.1">
    <line x1="450" y1="180" x2="0" y2="90"/><line x1="450" y1="180" x2="90" y2="90"/>
    <line x1="450" y1="180" x2="180" y2="90"/><line x1="450" y1="180" x2="270" y2="90"/>
    <line x1="450" y1="180" x2="360" y2="90"/><line x1="450" y1="180" x2="450" y2="90"/>
    <line x1="450" y1="180" x2="540" y2="90"/><line x1="450" y1="180" x2="630" y2="90"/>
    <line x1="450" y1="180" x2="720" y2="90"/><line x1="450" y1="180" x2="810" y2="90"/>
    <line x1="450" y1="180" x2="900" y2="90"/>
    <line x1="0" y1="110" x2="900" y2="110"/>
    <line x1="0" y1="128" x2="900" y2="128"/>
    <line x1="0" y1="146" x2="900" y2="146"/>
    <line x1="0" y1="164" x2="900" y2="164"/>
  </g>

  <!-- Scan line -->
  <rect x="0" y="0" width="900" height="3" fill="#ff0000" opacity="0.2" clip-path="url(#clip)">
    <animate attributeName="y" values="0;180;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.04;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Shadow text -->
  <text x="452" y="88" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="36" font-weight="700"
    fill="#ff0000" opacity="0.25" filter="url(#glow2)" letter-spacing="10">DRACONIK514</text>

  <!-- Main text -->
  <text x="450" y="86" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="36" font-weight="700"
    fill="url(#fireText)" filter="url(#glow)" letter-spacing="10">DRACONIK514</text>

  <!-- Sub text -->
  <text x="450" y="118" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12"
    fill="#8b0000" letter-spacing="8" filter="url(#glow)">FULLSTACK  DEVELOPER</text>

  <!-- Side blades -->
  <line x1="30" y1="86" x2="190" y2="86" stroke="#ff0000" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="710" y1="86" x2="870" y2="86" stroke="#ff0000" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="50" y1="118" x2="170" y2="118" stroke="#ff4500" stroke-width="1" opacity="0.5"/>
  <line x1="730" y1="118" x2="850" y2="118" stroke="#ff4500" stroke-width="1" opacity="0.5"/>

  <!-- Triangle accents -->
  <polygon points="20,86 30,80 30,92" fill="#ff0000" opacity="0.8" filter="url(#glow)"/>
  <polygon points="880,86 870,80 870,92" fill="#ff0000" opacity="0.8" filter="url(#glow)"/>

  <!-- Border -->
  <rect width="898" height="178" fill="none" stroke="url(#fireText)" stroke-width="1.5" rx="12" opacity="0.5"/>
  <polyline points="12,40 12,12 40,12" fill="none" stroke="#ff0000" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="860,12 888,12 888,40" fill="none" stroke="#ff0000" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="12,140 12,168 40,168" fill="none" stroke="#ff4500" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="860,168 888,168 888,140" fill="none" stroke="#ff4500" stroke-width="2.5" filter="url(#glow)"/>
</svg>
