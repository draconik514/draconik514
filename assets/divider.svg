<svg width="900" height="20" viewBox="0 0 900 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffd700" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#ffd700"/>
      <stop offset="35%"  stop-color="#bf00ff"/>
      <stop offset="50%"  stop-color="#00eeff"/>
      <stop offset="65%"  stop-color="#00ff88"/>
      <stop offset="85%"  stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- garis utama pakai rect bukan line agar gradient work -->
  <rect x="0" y="9" width="900" height="2" fill="url(#g1)"/>
  <!-- diamond tengah -->
  <polygon points="450,4 457,10 450,16 443,10" fill="#0d1117" stroke="#00eeff" stroke-width="1.5"/>
  <!-- dots -->
  <circle cx="340" cy="10" r="2.5" fill="#bf00ff"/>
  <circle cx="560" cy="10" r="2.5" fill="#ffd700"/>
  <circle cx="240" cy="10" r="2"   fill="#00eeff" opacity="0.8"/>
  <circle cx="660" cy="10" r="2"   fill="#00ff88" opacity="0.8"/>
  <circle cx="150" cy="10" r="1.5" fill="#ff6b35" opacity="0.6"/>
  <circle cx="750" cy="10" r="1.5" fill="#ff6b35" opacity="0.6"/>
</svg>
