<svg width="900" height="40" viewBox="0 0 900 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4ff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00b4ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00eeff;stop-opacity:1">
        <animate attributeName="stop-color" values="#00eeff;#00b4ff;#0066ff;#00eeff" dur="2.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" style="stop-color:#00b4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00b4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="40" fill="#0d1117"/>
  <line x1="0" y1="20" x2="900" y2="20" stroke="url(#divGrad)" stroke-width="2" filter="url(#glow)"/>

  <!-- Center diamond -->
  <polygon points="450,11 460,20 450,29 440,20" fill="#0d1117" stroke="#00b4ff" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="stroke" values="#00b4ff;#00eeff;#0066ff;#00b4ff" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
  <text x="450" y="24" text-anchor="middle" font-family="serif" font-size="9" fill="#00b4ff" filter="url(#glow)">✦</text>

  <!-- Side dots -->
  <circle cx="340" cy="20" r="2" fill="#00b4ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="560" cy="20" r="2" fill="#00b4ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="230" cy="20" r="1.5" fill="#0066ff" opacity="0.5"/>
  <circle cx="670" cy="20" r="1.5" fill="#0066ff" opacity="0.5"/>
</svg>
