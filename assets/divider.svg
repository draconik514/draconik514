<svg width="900" height="40" viewBox="0 0 900 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="40" fill="#0d1117"/>

  <!-- Main line -->
  <line x1="0" y1="20" x2="900" y2="20" stroke="url(#divGrad)" stroke-width="2" filter="url(#glow)"/>

  <!-- Center diamond -->
  <polygon points="450,12 458,20 450,28 442,20" fill="#0d1117" stroke="#00e5ff" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="stroke" values="#00e5ff;#7c3aed;#00e5ff" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Dots -->
  <circle cx="350" cy="20" r="2" fill="#00e5ff" opacity="0.6"/>
  <circle cx="550" cy="20" r="2" fill="#00e5ff" opacity="0.6"/>
  <circle cx="250" cy="20" r="1.5" fill="#7c3aed" opacity="0.4"/>
  <circle cx="650" cy="20" r="1.5" fill="#7c3aed" opacity="0.4"/>
</svg>
