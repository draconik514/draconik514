<svg width="900" height="40" viewBox="0 0 900 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#ff0000;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff4500;stop-opacity:1">
        <animate attributeName="stop-color" values="#ff4500;#ff0000;#ff6600;#ff4500" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" style="stop-color:#ff0000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="40" fill="#000000"/>

  <!-- Main line -->
  <line x1="0" y1="20" x2="900" y2="20" stroke="url(#divGrad)" stroke-width="2" filter="url(#glow)"/>

  <!-- Center skull diamond -->
  <polygon points="450,11 460,20 450,29 440,20" fill="#000000" stroke="#ff0000" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="stroke" values="#ff0000;#ff4500;#ff0000" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <text x="450" y="24" text-anchor="middle" font-family="serif" font-size="9" fill="#ff0000" filter="url(#glow)">✦</text>

  <!-- Side dots -->
  <circle cx="340" cy="20" r="2" fill="#ff0000" opacity="0.7" filter="url(#glow)"/>
  <circle cx="560" cy="20" r="2" fill="#ff0000" opacity="0.7" filter="url(#glow)"/>
  <circle cx="230" cy="20" r="1.5" fill="#ff4500" opacity="0.5"/>
  <circle cx="670" cy="20" r="1.5" fill="#ff4500" opacity="0.5"/>
</svg>
