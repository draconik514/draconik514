<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00e5ff;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="120" fill="url(#footerBg)" rx="12"/>

  <!-- Wave top -->
  <path d="M0,30 Q225,0 450,30 Q675,60 900,30 L900,0 L0,0 Z" fill="#00e5ff" opacity="0.05"/>
  <path d="M0,30 Q225,0 450,30 Q675,60 900,30" fill="none" stroke="url(#waveGrad)" stroke-width="1.5">
    <animate attributeName="d"
      values="M0,30 Q225,0 450,30 Q675,60 900,30;M0,30 Q225,60 450,30 Q675,0 900,30;M0,30 Q225,0 450,30 Q675,60 900,30"
      dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- Text -->
  <text x="450" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700"
    fill="#00e5ff" filter="url(#glow)" letter-spacing="3">
    💻 Code. Learn. Build. Repeat.
  </text>
  <text x="450" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#4a5568" letter-spacing="1">
    © 2025 Abubakar Siddiq • draconik514
  </text>

  <!-- Border -->
  <rect width="898" height="118" fill="none" stroke="#00e5ff" stroke-width="1" rx="12" opacity="0.2"/>
</svg>
