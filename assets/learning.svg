<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <!-- Tiap bar warna beda -->
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00eeff"/><stop offset="100%" style="stop-color:#00b4ff"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf00ff"/><stop offset="100%" style="stop-color:#7b00cc"/>
    </linearGradient>
    <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/><stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
    <linearGradient id="b4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/><stop offset="100%" style="stop-color:#cc9900"/>
    </linearGradient>
    <linearGradient id="b5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/><stop offset="100%" style="stop-color:#cc4400"/>
    </linearGradient>
    <linearGradient id="b6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3366"/><stop offset="100%" style="stop-color:#cc0033"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="320" fill="url(#bg)" rx="12"/>
  <rect width="898" height="318" fill="none" stroke="#00b4ff" stroke-width="2" rx="12" opacity="0.8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700"
    fill="#00eeff" filter="url(#glow)" letter-spacing="4">⚡ CURRENTLY LEARNING</text>
  <line x1="60" y1="50" x2="840" y2="50" stroke="url(#b1)" stroke-width="0.8" opacity="0.5"/>

  <!-- Go 80% — cyan -->
  <text x="30" y="85" font-family="JetBrains Mono, monospace" font-size="13" fill="#00eeff" font-weight="700">Go</text>
  <rect x="160" y="72" width="640" height="14" fill="#161b22" rx="7"/>
  <rect x="160" y="72" width="0" height="14" fill="url(#b1)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="512" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="85" font-family="JetBrains Mono, monospace" font-size="12" fill="#00eeff" font-weight="700">80%</text>

  <!-- React 80% — ungu -->
  <text x="30" y="125" font-family="JetBrains Mono, monospace" font-size="13" fill="#bf00ff" font-weight="700">React</text>
  <rect x="160" y="112" width="640" height="14" fill="#161b22" rx="7"/>
  <rect x="160" y="112" width="0" height="14" fill="url(#b2)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="512" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="125" font-family="JetBrains Mono, monospace" font-size="12" fill="#bf00ff" font-weight="700">80%</text>

  <!-- Docker 65% — hijau neon -->
  <text x="30" y="165" font-family="JetBrains Mono, monospace" font-size="13" fill="#00ff88" font-weight="700">Docker</text>
  <rect x="160" y="152" width="640" height="14" fill="#161b22" rx="7"/>
  <rect x="160" y="152" width="0" height="14" fill="url(#b3)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="416" dur="1.7s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="165" font-family="JetBrains Mono, monospace" font-size="12" fill="#00ff88" font-weight="700">65%</text>

  <!-- PostgreSQL 50% — emas -->
  <text x="30" y="205" font-family="JetBrains Mono, monospace" font-size="13" fill="#ffd700" font-weight="700">PostgreSQL</text>
  <rect x="160" y="192" width="640" height="14" fill="#161b22" rx="7"/>
  <rect x="160" y="192" width="0" height="14" fill="url(#b4)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="320" dur="1.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="205" font-family="JetBrains Mono, monospace" font-size="12" fill="#ffd700" font-weight="700">50%</text>

  <!-- Kubernetes 30% — oranye -->
  <text x="30" y="245" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff6b35" font-weight="700">Kubernetes</text>
  <rect x="160" y="232" width="640" height="14" fill="#161b22" rx="7"/>
  <rect x="160" y="232" width="0" height="14" fill="url(#b5)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="192" dur="1.9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="245" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff6b35" font-weight="700">30%</text>

  <!-- AWS 25% — pink merah -->
  <text x="30" y="285" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff3366" font-weight="700">AWS</text>
  <rect x="160" y="272" width="640" height="14" fill="#161b22" rx="7"/>
  <rect x="160" y="272" width="0" height="14" fill="url(#b6)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="160" dur="2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="285" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff3366" font-weight="700">25%</text>
</svg>
