<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0000"/>
    </linearGradient>
    <linearGradient id="barGo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="100%" style="stop-color:#ff4500"/>
    </linearGradient>
    <linearGradient id="barReact" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <linearGradient id="barDocker" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <linearGradient id="barPg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000"/>
      <stop offset="100%" style="stop-color:#ff0000"/>
    </linearGradient>
    <linearGradient id="barK8s" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2200"/>
      <stop offset="100%" style="stop-color:#ff4500"/>
    </linearGradient>
    <linearGradient id="barAws" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="320" fill="url(#bg)" rx="12"/>
  <rect width="898" height="318" fill="none" stroke="#ff0000" stroke-width="1" rx="12" opacity="0.3"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700"
    fill="#ff0000" filter="url(#glow)" letter-spacing="4">⚡ CURRENTLY LEARNING</text>
  <line x1="60" y1="50" x2="840" y2="50" stroke="#ff0000" stroke-width="0.5" opacity="0.4"/>

  <!-- Go 80% -->
  <text x="30" y="85" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">Go</text>
  <rect x="160" y="72" width="640" height="14" fill="#1a0000" rx="7"/>
  <rect x="160" y="72" width="0" height="14" fill="url(#barGo)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="512" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="85" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff4500" font-weight="700">80%</text>

  <!-- React 80% -->
  <text x="30" y="125" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">React</text>
  <rect x="160" y="112" width="640" height="14" fill="#1a0000" rx="7"/>
  <rect x="160" y="112" width="0" height="14" fill="url(#barReact)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="512" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="125" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff6600" font-weight="700">80%</text>

  <!-- Docker 65% -->
  <text x="30" y="165" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">Docker</text>
  <rect x="160" y="152" width="640" height="14" fill="#1a0000" rx="7"/>
  <rect x="160" y="152" width="0" height="14" fill="url(#barDocker)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="416" dur="1.7s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="165" font-family="JetBrains Mono, monospace" font-size="12" fill="#cc0000" font-weight="700">65%</text>

  <!-- PostgreSQL 50% -->
  <text x="30" y="205" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">PostgreSQL</text>
  <rect x="160" y="192" width="640" height="14" fill="#1a0000" rx="7"/>
  <rect x="160" y="192" width="0" height="14" fill="url(#barPg)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="320" dur="1.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="205" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff0000" font-weight="700">50%</text>

  <!-- Kubernetes 30% -->
  <text x="30" y="245" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">Kubernetes</text>
  <rect x="160" y="232" width="640" height="14" fill="#1a0000" rx="7"/>
  <rect x="160" y="232" width="0" height="14" fill="url(#barK8s)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="192" dur="1.9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="245" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff4500" font-weight="700">30%</text>

  <!-- AWS 25% -->
  <text x="30" y="285" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">AWS</text>
  <rect x="160" y="272" width="640" height="14" fill="#1a0000" rx="7"/>
  <rect x="160" y="272" width="0" height="14" fill="url(#barAws)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="160" dur="2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="285" font-family="JetBrains Mono, monospace" font-size="12" fill="#8b0000" font-weight="700">25%</text>
</svg>
