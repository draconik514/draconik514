<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="barGo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="barReact" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>
    <linearGradient id="barDocker" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="barPg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="barK8s" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="barAws" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="320" fill="url(#bg)" rx="12"/>
  <rect width="898" height="318" fill="none" stroke="#7c3aed" stroke-width="1" rx="12" opacity="0.3"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700"
    fill="#00e5ff" filter="url(#glow)" letter-spacing="4">📚 CURRENTLY LEARNING</text>
  <line x1="60" y1="50" x2="840" y2="50" stroke="#7c3aed" stroke-width="0.5" opacity="0.5"/>

  <!-- Row 1: Golang 80% -->
  <text x="30" y="85" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0">Go</text>
  <rect x="160" y="72" width="640" height="14" fill="#1a1b27" rx="7"/>
  <rect x="160" y="72" width="0" height="14" fill="url(#barGo)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="512" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="85" font-family="JetBrains Mono, monospace" font-size="12" fill="#00e5ff" font-weight="700">80%</text>

  <!-- Row 2: React 80% -->
  <text x="30" y="125" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0">React</text>
  <rect x="160" y="112" width="640" height="14" fill="#1a1b27" rx="7"/>
  <rect x="160" y="112" width="0" height="14" fill="url(#barReact)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="512" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="125" font-family="JetBrains Mono, monospace" font-size="12" fill="#7c3aed" font-weight="700">80%</text>

  <!-- Row 3: Docker 65% -->
  <text x="30" y="165" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0">Docker</text>
  <rect x="160" y="152" width="640" height="14" fill="#1a1b27" rx="7"/>
  <rect x="160" y="152" width="0" height="14" fill="url(#barDocker)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="416" dur="1.7s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="165" font-family="JetBrains Mono, monospace" font-size="12" fill="#0ea5e9" font-weight="700">65%</text>

  <!-- Row 4: PostgreSQL 50% -->
  <text x="30" y="205" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0">PostgreSQL</text>
  <rect x="160" y="192" width="640" height="14" fill="#1a1b27" rx="7"/>
  <rect x="160" y="192" width="0" height="14" fill="url(#barPg)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="320" dur="1.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="205" font-family="JetBrains Mono, monospace" font-size="12" fill="#a855f7" font-weight="700">50%</text>

  <!-- Row 5: Kubernetes 30% -->
  <text x="30" y="245" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0">Kubernetes</text>
  <rect x="160" y="232" width="640" height="14" fill="#1a1b27" rx="7"/>
  <rect x="160" y="232" width="0" height="14" fill="url(#barK8s)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="192" dur="1.9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="245" font-family="JetBrains Mono, monospace" font-size="12" fill="#00e5ff" font-weight="700">30%</text>

  <!-- Row 6: AWS 25% -->
  <text x="30" y="285" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0">AWS</text>
  <rect x="160" y="272" width="640" height="14" fill="#1a1b27" rx="7"/>
  <rect x="160" y="272" width="0" height="14" fill="url(#barAws)" rx="7" filter="url(#glow)">
    <animate attributeName="width" from="0" to="160" dur="2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="815" y="285" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b" font-weight="700">25%</text>
</svg>
