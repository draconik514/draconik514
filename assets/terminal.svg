<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b27"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Window -->
  <rect width="900" height="280" fill="url(#termBg)" rx="12"/>
  <rect width="900" height="280" fill="none" stroke="#00e5ff" stroke-width="1" rx="12" opacity="0.3"/>

  <!-- Title bar -->
  <rect width="900" height="40" fill="#161b22" rx="12"/>
  <rect width="900" height="20" y="20" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="28" cy="20" r="7" fill="#ff5f57"/>
  <circle cx="52" cy="20" r="7" fill="#febc2e"/>
  <circle cx="76" cy="20" r="7" fill="#28c840"/>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#a0aec0">
    draconik514 — terminal
  </text>

  <!-- Prompt lines -->
  <text x="30" y="75" font-family="JetBrains Mono, monospace" font-size="13" fill="#7c3aed">draconik514</text>
  <text x="130" y="75" font-family="JetBrains Mono, monospace" font-size="13" fill="#a0aec0">@github</text>
  <text x="200" y="75" font-family="JetBrains Mono, monospace" font-size="13" fill="#00e5ff"> ~ $</text>
  <text x="240" y="75" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0"> whoami</text>

  <text x="30" y="105" font-family="JetBrains Mono, monospace" font-size="13" fill="#28c840" filter="url(#glow)">
    → Abubakar Siddiq | Fullstack Developer | Indonesia 🇮🇩
  </text>

  <text x="30" y="135" font-family="JetBrains Mono, monospace" font-size="13" fill="#7c3aed">draconik514</text>
  <text x="130" y="135" font-family="JetBrains Mono, monospace" font-size="13" fill="#a0aec0">@github</text>
  <text x="200" y="135" font-family="JetBrains Mono, monospace" font-size="13" fill="#00e5ff"> ~ $</text>
  <text x="240" y="135" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0"> cat skills.txt</text>

  <text x="30" y="163" font-family="JetBrains Mono, monospace" font-size="12" fill="#00e5ff">Backend  :</text>
  <text x="120" y="163" font-family="JetBrains Mono, monospace" font-size="12" fill="#e2e8f0"> Go · Gin · REST API · JWT · GORM</text>
  <text x="30" y="183" font-family="JetBrains Mono, monospace" font-size="12" fill="#00e5ff">Frontend :</text>
  <text x="120" y="183" font-family="JetBrains Mono, monospace" font-size="12" fill="#e2e8f0"> React · Tailwind CSS · JavaScript</text>
  <text x="30" y="203" font-family="JetBrains Mono, monospace" font-size="12" fill="#00e5ff">Database :</text>
  <text x="120" y="203" font-family="JetBrains Mono, monospace" font-size="12" fill="#e2e8f0"> MySQL · PostgreSQL</text>
  <text x="30" y="223" font-family="JetBrains Mono, monospace" font-size="12" fill="#00e5ff">Tools    :</text>
  <text x="120" y="223" font-family="JetBrains Mono, monospace" font-size="12" fill="#e2e8f0"> Docker · Git · Linux · VS Code</text>

  <text x="30" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#7c3aed">draconik514</text>
  <text x="130" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#a0aec0">@github</text>
  <text x="200" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#00e5ff"> ~ $</text>
  <text x="240" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>█
  </text>
</svg>
