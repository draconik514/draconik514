<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0000"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="280" fill="url(#termBg)" rx="12"/>
  <rect width="900" height="280" fill="none" stroke="#ff0000" stroke-width="1" rx="12" opacity="0.35"/>

  <!-- Title bar -->
  <rect width="900" height="40" fill="#0d0000" rx="12"/>
  <rect width="900" height="20" y="20" fill="#0d0000"/>

  <!-- Traffic lights -->
  <circle cx="28" cy="20" r="7" fill="#ff2200"/>
  <circle cx="52" cy="20" r="7" fill="#ff4500"/>
  <circle cx="76" cy="20" r="7" fill="#8b0000"/>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000" letter-spacing="2">
    draconik514 — /bin/dark
  </text>

  <!-- Separator -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#ff0000" stroke-width="0.5" opacity="0.3"/>

  <!-- Prompt 1 -->
  <text x="30" y="75" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff0000" filter="url(#glow)">draconik514</text>
  <text x="138" y="75" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000">@github</text>
  <text x="210" y="75" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff4500"> ~ $</text>
  <text x="250" y="75" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0"> whoami</text>

  <text x="30" y="100" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff4500" filter="url(#glow)">
    ⚡ Abubakar Siddiq | Fullstack Developer | Indonesia 🇮🇩
  </text>

  <!-- Prompt 2 -->
  <text x="30" y="128" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff0000" filter="url(#glow)">draconik514</text>
  <text x="138" y="128" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000">@github</text>
  <text x="210" y="128" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff4500"> ~ $</text>
  <text x="250" y="128" font-family="JetBrains Mono, monospace" font-size="13" fill="#e2e8f0"> cat skills.txt</text>

  <!-- Skills -->
  <text x="30" y="155" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff0000" filter="url(#glow)">Backend  :</text>
  <text x="120" y="155" font-family="JetBrains Mono, monospace" font-size="12" fill="#c0c0c0"> Go · Gin · REST API · JWT · GORM</text>
  <text x="30" y="175" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff0000" filter="url(#glow)">Frontend :</text>
  <text x="120" y="175" font-family="JetBrains Mono, monospace" font-size="12" fill="#c0c0c0"> React · Tailwind CSS · JavaScript</text>
  <text x="30" y="195" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff0000" filter="url(#glow)">Database :</text>
  <text x="120" y="195" font-family="JetBrains Mono, monospace" font-size="12" fill="#c0c0c0"> MySQL · PostgreSQL</text>
  <text x="30" y="215" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff0000" filter="url(#glow)">Tools    :</text>
  <text x="120" y="215" font-family="JetBrains Mono, monospace" font-size="12" fill="#c0c0c0"> Docker · Git · Linux · VS Code</text>

  <!-- Prompt 3 cursor -->
  <text x="30" y="250" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff0000" filter="url(#glow)">draconik514</text>
  <text x="138" y="250" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000">@github</text>
  <text x="210" y="250" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff4500"> ~ $</text>
  <text x="250" y="250" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff4500" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>█
  </text>
</svg>
