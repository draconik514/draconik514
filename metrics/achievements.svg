<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0000"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000"/>
      <stop offset="100%" style="stop-color:#0a0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  <rect width="898" height="298" fill="none" stroke="#ff0000" stroke-width="1" rx="12" opacity="0.3"/>

  <!-- Header -->
  <text x="30" y="38" font-family="JetBrains Mono, monospace" font-size="15" font-weight="700"
    fill="#ff0000" filter="url(#glow)" letter-spacing="3">🏆 ACHIEVEMENTS</text>
  <line x1="30" y1="50" x2="870" y2="50" stroke="#ff0000" stroke-width="0.5" opacity="0.4"/>

  <!-- Badge 1 -->
  <rect x="30" y="70" width="180" height="90" fill="url(#badgeGrad)" rx="10" stroke="#ff0000" stroke-width="1" opacity="0.8"/>
  <text x="120" y="105" text-anchor="middle" font-family="serif" font-size="28">🦈</text>
  <text x="120" y="125" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ff0000" font-weight="700" filter="url(#glow)">Pull Shark</text>
  <text x="120" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b0000">×2</text>

  <!-- Badge 2 -->
  <rect x="230" y="70" width="180" height="90" fill="url(#badgeGrad)" rx="10" stroke="#ff4500" stroke-width="1" opacity="0.8"/>
  <text x="320" y="105" text-anchor="middle" font-family="serif" font-size="28">⚡</text>
  <text x="320" y="125" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ff4500" font-weight="700" filter="url(#glow)">Quickdraw</text>
  <text x="320" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b0000">Unlocked</text>

  <!-- Badge 3 -->
  <rect x="430" y="70" width="180" height="90" fill="url(#badgeGrad)" rx="10" stroke="#cc0000" stroke-width="1" opacity="0.8"/>
  <text x="520" y="105" text-anchor="middle" font-family="serif" font-size="28">🌟</text>
  <text x="520" y="125" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#cc0000" font-weight="700" filter="url(#glow)">Starstruck</text>
  <text x="520" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b0000">Unlocked</text>

  <!-- Badge 4 -->
  <rect x="630" y="70" width="180" height="90" fill="url(#badgeGrad)" rx="10" stroke="#ff0000" stroke-width="1" opacity="0.8"/>
  <text x="720" y="105" text-anchor="middle" font-family="serif" font-size="28">🦅</text>
  <text x="720" y="125" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ff0000" font-weight="700" filter="url(#glow)">YOLO</text>
  <text x="720" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b0000">Unlocked</text>

  <!-- Stats row -->
  <line x1="30" y1="185" x2="870" y2="185" stroke="#ff0000" stroke-width="0.5" opacity="0.3"/>

  <text x="30" y="215" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000">Total Commits</text>
  <text x="200" y="215" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff0000" font-weight="700" filter="url(#glow)">200+</text>

  <text x="320" y="215" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000">Repositories</text>
  <text x="470" y="215" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff4500" font-weight="700" filter="url(#glow)">18</text>

  <text x="560" y="215" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000">Stars Earned</text>
  <text x="710" y="215" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff0000" font-weight="700" filter="url(#glow)">10+</text>

  <text x="30" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000">Followers</text>
  <text x="150" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff4500" font-weight="700" filter="url(#glow)">Growing...</text>

  <text x="320" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000">PRs Merged</text>
  <text x="470" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff0000" font-weight="700" filter="url(#glow)">15+</text>

  <text x="560" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000">Issues Closed</text>
  <text x="720" y="255" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff4500" font-weight="700" filter="url(#glow)">20+</text>
</svg>
