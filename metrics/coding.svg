    <animate attributeName="width" from="0" to="96" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- TypeScript 7% -->
  <text x="30" y="159" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">TypeScript</text>
  <text x="150" y="159" font-family="JetBrains Mono, monospace" font-size="11" fill="#8b0000">7%</text>
  <rect x="210" y="147" width="640" height="13" fill="#1a0000" rx="6"/>
  <rect x="210" y="147" width="0" height="13" fill="url(#barTs)" rx="6" filter="url(#glow)">
    <animate attributeName="width" from="0" to="45" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- React/JSX 4% -->
  <text x="30" y="196" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">React/JSX</text>
  <text x="150" y="196" font-family="JetBrains Mono, monospace" font-size="11" fill="#8b0000">4%</text>
  <rect x="210" y="184" width="640" height="13" fill="#1a0000" rx="6"/>
  <rect x="210" y="184" width="0" height="13" fill="url(#barReact)" rx="6" filter="url(#glow)">
    <animate attributeName="width" from="0" to="26" dur="1.7s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- SQL 2% -->
  <text x="30" y="233" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">SQL</text>
