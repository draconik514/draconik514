  <rect x="150" y="221" width="700" height="13" fill="#1a0000" rx="6"/>
  <rect x="150" y="221" width="0" height="13" fill="url(#barSql)" rx="6" filter="url(#glow)">
    <animate attributeName="width" from="0" to="14" dur="1.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- Footer note -->
  <text x="30" y="275" font-family="JetBrains Mono, monospace" font-size="11" fill="#3d0000">
    Last updated: auto-generated by GitHub Actions
  </text>
</svg>
