  <line x1="30" y1="50" x2="870" y2="50" stroke="#ff0000" stroke-width="0.5" opacity="0.4"/>

  <!-- Go 72% -->
  <text x="30" y="85" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">Go</text>
  <text x="100" y="85" font-family="JetBrains Mono, monospace" font-size="11" fill="#8b0000">72%</text>
  <rect x="150" y="73" width="700" height="13" fill="#1a0000" rx="6"/>
  <rect x="150" y="73" width="0" height="13" fill="url(#barGo)" rx="6" filter="url(#glow)">
    <animate attributeName="width" from="0" to="504" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- JavaScript 15% -->
  <text x="30" y="122" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">JavaScript</text>
