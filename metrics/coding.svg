<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0000"/>
    </linearGradient>
    <linearGradient id="barGo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="100%" style="stop-color:#ff4500"/>
    </linearGradient>
    <linearGradient id="barJs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <linearGradient id="barTs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc0000"/>
      <stop offset="100%" style="stop-color:#ff0000"/>
    </linearGradient>
    <linearGradient id="barReact" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000"/>
      <stop offset="100%" style="stop-color:#ff2200"/>
