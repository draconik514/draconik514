<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  <rect width="898" height="298" fill="none" stroke="#bf00ff" stroke-width="2" rx="12" opacity="0.8"/>

  <text x="30" y="38" font-family="JetBrains Mono, monospace" font-size="15" font-weight="700" fill="#bf00ff" filter="url(#glow)" letter-spacing="3">🔥 TOP LANGUAGES</text>
  <line x1="30" y1="50" x2="870" y2="50" stroke="#bf00ff" stroke-width="0.8" opacity="0.5"/>

  <!-- Pie chart — tiap slice warna beda -->
  <path d="M220,175 L220,75 A100,100 0 1,1 97.6,249.6 Z" fill="#00eeff" opacity="0.9" filter="url(#glow2)"/>
  <path d="M220,175 L97.6,249.6 A100,100 0 0,1 163.4,82.6 Z" fill="#bf00ff" opacity="0.9"/>
  <path d="M220,175 L163.4,82.6 A100,100 0 0,1 196.2,75.6 Z" fill="#00ff88" opacity="0.9"/>
  <path d="M220,175 L196.2,75.6 A100,100 0 0,1 214.9,75.1 Z" fill="#ffd700" opacity="0.9"/>
  <path d="M220,175 L214.9,75.1 A100,100 0 0,1 220,75 Z" fill="#ff6b35" opacity="0.9"/>

  <!-- Center hole -->
  <circle cx="220" cy="175" r="55" fill="#0d1117"/>
  <text x="220" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#00eeff" filter="url(#glow)">LANG</text>
  <text x="220" y="186" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#bf00ff">STATS</text>

  <!-- Legend colorful -->
  <rect x="400" y="80" width="14" height="14" fill="#00eeff" rx="2" filter="url(#glow)"/>
  <text x="422" y="92" font-family="JetBrains Mono, monospace" font-size="13" fill="#e6edf3">Go</text>
  <text x="560" y="92" font-family="JetBrains Mono, monospace" font-size="13" fill="#00eeff" font-weight="700">72%</text>

  <rect x="400" y="112" width="14" height="14" fill="#bf00ff" rx="2"/>
  <text x="422" y="124" font-family="JetBrains Mono, monospace" font-size="13" fill="#e6edf3">JavaScript</text>
  <text x="560" y="124" font-family="JetBrains Mono, monospace" font-size="13" fill="#bf00ff" font-weight="700">15%</text>

  <rect x="400" y="144" width="14" height="14" fill="#00ff88" rx="2"/>
  <text x="422" y="156" font-family="JetBrains Mono, monospace" font-size="13" fill="#e6edf3">TypeScript</text>
  <text x="560" y="156" font-family="JetBrains Mono, monospace" font-size="13" fill="#00ff88" font-weight="700">7%</text>

  <rect x="400" y="176" width="14" height="14" fill="#ffd700" rx="2"/>
  <text x="422" y="188" font-family="JetBrains Mono, monospace" font-size="13" fill="#e6edf3">React/JSX</text>
  <text x="560" y="188" font-family="JetBrains Mono, monospace" font-size="13" fill="#ffd700" font-weight="700">4%</text>

  <rect x="400" y="208" width="14" height="14" fill="#ff6b35" rx="2"/>
  <text x="422" y="220" font-family="JetBrains Mono, monospace" font-size="13" fill="#e6edf3">SQL</text>
  <text x="560" y="220" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff6b35" font-weight="700">2%</text>

  <text x="30" y="275" font-family="JetBrains Mono, monospace" font-size="11" fill="#8b949e">Based on public repositories</text>
