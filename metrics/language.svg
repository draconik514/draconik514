<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  <rect width="898" height="298" fill="none" stroke="#ff0000" stroke-width="1" rx="12" opacity="0.3"/>

  <!-- Header -->
  <text x="30" y="38" font-family="JetBrains Mono, monospace" font-size="15" font-weight="700"
    fill="#ff0000" filter="url(#glow)" letter-spacing="3">🔥 TOP LANGUAGES</text>
  <line x1="30" y1="50" x2="870" y2="50" stroke="#ff0000" stroke-width="0.5" opacity="0.4"/>

  <!-- Pie chart (manual arcs) center 220,175 r=100 -->
  <!-- Go 72% = 259.2deg -->
  <path d="M220,175 L220,75 A100,100 0 1,1 97.6,249.6 Z" fill="#ff0000" opacity="0.85" filter="url(#glow2)"/>
  <!-- JavaScript 15% = 54deg -->
  <path d="M220,175 L97.6,249.6 A100,100 0 0,1 163.4,82.6 Z" fill="#ff4500" opacity="0.85"/>
  <!-- TypeScript 7% = 25.2deg -->
  <path d="M220,175 L163.4,82.6 A100,100 0 0,1 196.2,75.6 Z" fill="#cc0000" opacity="0.85"/>
  <!-- React 4% = 14.4deg -->
  <path d="M220,175 L196.2,75.6 A100,100 0 0,1 214.9,75.1 Z" fill="#8b0000" opacity="0.85"/>
  <!-- SQL 2% = 7.2deg -->
  <path d="M220,175 L214.9,75.1 A100,100 0 0,1 220,75 Z" fill="#ff2200" opacity="0.85"/>

  <!-- Center hole -->
  <circle cx="220" cy="175" r="55" fill="#000000"/>
  <text x="220" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ff0000" filter="url(#glow)">LANG</text>
  <text x="220" y="186" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ff4500">STATS</text>

  <!-- Legend -->
  <rect x="400" y="80" width="14" height="14" fill="#ff0000" rx="2" filter="url(#glow)"/>
  <text x="422" y="92" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">Go</text>
  <text x="560" y="92" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff0000" font-weight="700">72%</text>

  <rect x="400" y="112" width="14" height="14" fill="#ff4500" rx="2"/>
  <text x="422" y="124" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">JavaScript</text>
  <text x="560" y="124" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff4500" font-weight="700">15%</text>

  <rect x="400" y="144" width="14" height="14" fill="#cc0000" rx="2"/>
  <text x="422" y="156" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">TypeScript</text>
  <text x="560" y="156" font-family="JetBrains Mono, monospace" font-size="13" fill="#cc0000" font-weight="700">7%</text>

  <rect x="400" y="176" width="14" height="14" fill="#8b0000" rx="2"/>
  <text x="422" y="188" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">React/JSX</text>
  <text x="560" y="188" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b0000" font-weight="700">4%</text>

  <rect x="400" y="208" width="14" height="14" fill="#ff2200" rx="2"/>
  <text x="422" y="220" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0c0c0">SQL</text>
  <text x="560" y="220" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff2200" font-weight="700">2%</text>

  <text x="30" y="275" font-family="JetBrains Mono, monospace" font-size="11" fill="#3d0000">
    Based on public repositories
  </text>
</svg>
