<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/><stop offset="100%" style="stop-color:#00050f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  <rect width="898" height="298" fill="none" stroke="#00b4ff" stroke-width="1" rx="12" opacity="0.3"/>
  <text x="30" y="38" font-family="JetBrains Mono, monospace" font-size="15" font-weight="700" fill="#00b4ff" filter="url(#glow)" letter-spacing="3">⭐ STARRED REPOS</text>
  <line x1="30" y1="50" x2="870" y2="50" stroke="#00b4ff" stroke-width="0.5" opacity="0.4"/>

  <text x="200" y="160" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="72" font-weight="700"
    fill="#00b4ff" filter="url(#glow2)" opacity="0.9">10</text>
  <text x="200" y="195" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14"
    fill="#003d7a" letter-spacing="3">TOTAL STARS</text>

  <text x="80" y="100" font-family="serif" font-size="18" fill="#00eeff" filter="url(#glow)" opacity="0.7">
    ★<animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="300" y="80" font-family="serif" font-size="14" fill="#00b4ff" filter="url(#glow)" opacity="0.5">
    ★<animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="130" y="230" font-family="serif" font-size="12" fill="#0066ff" opacity="0.4">
    ★<animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
  </text>

  <line x1="350" y1="80" x2="350" y2="260" stroke="#00b4ff" stroke-width="0.5" opacity="0.3"/>

  <text x="380" y="90" font-family="JetBrains Mono, monospace" font-size="12" fill="#003d7a" letter-spacing="2">MOST STARRED</text>
  <line x1="380" y1="98" x2="870" y2="98" stroke="#00b4ff" stroke-width="0.3" opacity="0.3"/>

  <text x="380" y="125" font-family="JetBrains Mono, monospace" font-size="13" fill="#00b4ff" filter="url(#glow)">rest-api-system</text>
  <text x="750" y="125" font-family="JetBrains Mono, monospace" font-size="13" fill="#00eeff" font-weight="700">⭐ 3</text>

  <text x="380" y="158" font-family="JetBrains Mono, monospace" font-size="13" fill="#0066ff">laundry-system</text>
  <text x="750" y="158" font-family="JetBrains Mono, monospace" font-size="13" fill="#00b4ff" font-weight="700">⭐ 2</text>

  <text x="380" y="191" font-family="JetBrains Mono, monospace" font-size="13" fill="#0066ff">barbershop-booking</text>
  <text x="750" y="191" font-family="JetBrains Mono, monospace" font-size="13" fill="#00b4ff" font-weight="700">⭐ 2</text>

  <text x="380" y="224" font-family="JetBrains Mono, monospace" font-size="13" fill="#003d7a">inventory-system</text>
  <text x="750" y="224" font-family="JetBrains Mono, monospace" font-size="13" fill="#0066ff" font-weight="700">⭐ 1</text>

  <text x="30" y="283" font-family="JetBrains Mono, monospace" font-size="11" fill="#003d7a">Stars earned across all public repositories</text>
</svg>
